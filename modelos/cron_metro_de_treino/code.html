<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0a0e14]/40 backdrop-blur-xl shadow-[0_4px_30px_rgba(164,255,0,0.05)] flex justify-between items-center px-6 h-20">
<div class="flex items-center gap-4">
<button class="text-[#ddffaf] active:scale-95 transition-transform duration-300">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline font-bold uppercase tracking-tighter text-[#ddffaf]">TREINO ATIVO</h1>
</div>
<div class="flex items-center gap-4">
<button class="text-[#ddffaf] active:scale-95 transition-transform duration-300">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto min-h-screen flex flex-col items-center">
<!-- Mode Selection -->
<div class="w-full bg-surface-container-low p-1.5 rounded-full flex mb-10">
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold tracking-wide uppercase transition-all duration-300 bg-primary-container text-on-primary-container shadow-lg shadow-primary-container/20">
                Cronômetro Livre
            </button>
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold tracking-wide uppercase transition-all duration-300 text-on-surface-variant hover:text-on-surface">
                Conectado ao Treino
            </button>
</div>
<!-- Workout Context (Connected Mode Active) -->
<div class="w-full glass-card rounded-lg p-6 mb-8 border border-white/5 relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/5 blur-3xl rounded-full -mr-16 -mt-16 group-hover:bg-primary-container/10 transition-colors"></div>
<div class="flex items-start justify-between relative z-10">
<div>
<span class="text-secondary text-[10px] font-extrabold uppercase tracking-[0.2em] mb-1 block">Exercício Atual</span>
<h2 class="font-headline text-2xl font-bold text-on-surface">Supino Inclinado</h2>
<p class="text-on-surface-variant text-sm mt-1">Série 3 de 4 • 10-12 Reps</p>
</div>
<div class="bg-surface-container-highest p-3 rounded-2xl">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
</div>
<div class="mt-6 flex items-center justify-between border-t border-outline-variant/20 pt-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-lg">schedule</span>
<span class="text-sm font-medium text-on-surface-variant">Descanso: <span class="text-on-surface">90s</span></span>
</div>
<div class="text-xs font-bold text-primary-container uppercase tracking-widest">Próximo: Voador</div>
</div>
</div>
<!-- Timer Display -->
<div class="relative w-72 h-72 mb-12 flex items-center justify-center">
<!-- Neon Glow Ring -->
<div class="absolute inset-0 rounded-full border-4 border-surface-container-highest shadow-[0_0_50px_rgba(163,254,0,0.1)]"></div>
<!-- Progress Ring (SVG) -->
<svg class="absolute inset-0 w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<circle class="text-primary-container" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-dasharray="289" stroke-dashoffset="86" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<!-- Inner Timer Text -->
<div class="text-center z-10">
<div class="font-headline text-8xl font-black text-on-surface tracking-tighter tabular-nums drop-shadow-[0_0_20px_rgba(163,254,0,0.2)]">
                    01:04
                </div>
<div class="text-primary-container font-headline text-lg font-bold tracking-[0.3em] -mt-2 uppercase opacity-80">
                    Restante
                </div>
</div>
</div>
<!-- Control Buttons -->
<div class="w-full grid grid-cols-2 gap-4">
<button class="col-span-2 bg-primary-container text-on-primary-container py-6 rounded-full font-headline font-black text-xl tracking-widest active:scale-95 transition-all ease-out-expo shadow-[0_10px_40px_rgba(163,254,0,0.2)] flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">pause</span>
                PAUSAR
            </button>
<button class="bg-surface-container-highest text-on-surface py-5 rounded-full font-headline font-bold text-sm tracking-widest active:scale-95 transition-all ease-out-expo border border-outline-variant/20">
                REINICIAR
            </button>
<button class="bg-surface-container-highest text-secondary py-5 rounded-full font-headline font-bold text-sm tracking-widest active:scale-95 transition-all ease-out-expo border border-outline-variant/20 flex items-center justify-center gap-2">
                PULAR SÉRIE
                <span class="material-symbols-outlined text-lg">fast_forward</span>
</button>

<nav class="fixed bottom-0 w-full rounded-t-[2rem] z-50 bg-[#0a0e14]/80 backdrop-blur-2xl border-t border-[#ddffaf]/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex justify-around items-center h-24 px-8 pb-4">

</a>

<div class="fixed bottom-1/4 -right-20 w-64 h-64 bg-secondary/5 blur-[120px] rounded-full pointer-events-none"></div>
