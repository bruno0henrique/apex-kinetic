<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>APEX KINETIC - Splash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#b92902",
              "secondary-fixed-dim": "#00d7f0",
              "outline-variant": "#44484f",
              "surface-tint": "#ddffaf",
              "on-background": "#f1f3fc",
              "on-tertiary": "#00195b",
              "surface-container": "#151a21",
              "on-secondary-fixed": "#003a42",
              "inverse-primary": "#426a00",
              "inverse-on-surface": "#51555d",
              "error-dim": "#d53d18",
              "background": "#0a0e14",
              "tertiary-fixed-dim": "#849eff",
              "secondary-container": "#006875",
              "tertiary": "#7c98ff",
              "surface-container-lowest": "#000000",
              "on-surface-variant": "#a8abb3",
              "primary-dim": "#99ee00",
              "primary": "#ddffaf",
              "on-tertiary-fixed": "#001248",
              "on-primary-fixed-variant": "#406800",
              "on-error": "#450900",
              "on-primary": "#3f6600",
              "on-surface": "#f1f3fc",
              "surface-variant": "#20262f",
              "on-tertiary-fixed-variant": "#002e94",
              "on-tertiary-container": "#ffffff",
              "surface": "#0a0e14",
              "primary-container": "#a3fe00",
              "on-secondary-container": "#e8fbff",
              "inverse-surface": "#f8f9ff",
              "surface-container-highest": "#20262f",
              "tertiary-dim": "#3367ff",
              "secondary-dim": "#00d4ec",
              "secondary-fixed": "#26e6ff",
              "on-secondary-fixed-variant": "#005964",
              "secondary": "#00e3fd",
              "on-secondary": "#004d57",
              "surface-container-high": "#1b2028",
              "surface-container-low": "#0f141a",
              "primary-fixed": "#a3fe00",
              "outline": "#72757d",
              "surface-bright": "#262c36",
              "on-primary-fixed": "#2c4900",
              "surface-dim": "#0a0e14",
              "on-primary-container": "#395d00",
              "tertiary-container": "#1858f6",
              "on-error-container": "#ffd2c8",
              "tertiary-fixed": "#98adff",
              "primary-fixed-dim": "#99ee00",
              "error": "#ff7351"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        /* High-performance Glow Effect */
        .neon-glow {
            text-shadow: 0 0 20px rgba(163, 254, 0, 0.6), 0 0 40px rgba(163, 254, 0, 0.3);
        }

        .kinetic-bg {
            background: radial-gradient(circle at center, #151a21 0%, #0a0e14 100%);
        }
        
        .progress-pulse-head {
            box-shadow: 0 0 12px 2px rgba(163, 254, 0, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body antialiased overflow-hidden">
<!-- Splash Screen Wrapper -->
<main class="relative h-screen w-full flex flex-col items-center justify-center kinetic-bg px-8">
<!-- Subtle Ambient Background Texture -->
<div class="absolute inset-0 overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary/10 blur-[120px] rounded-full"></div>
</div>
<!-- Central Branding Cluster -->
<div class="flex flex-col items-center gap-12 z-10 w-full max-w-md">
<!-- Logo with Italic & Bold Space Grotesk -->
<div class="text-center">
<h1 class="font-headline font-bold italic text-5xl md:text-6xl text-primary-fixed neon-glow tracking-tighter uppercase">
                    APEX KINETIC
                </h1>
<p class="font-label text-secondary tracking-[0.3em] text-[10px] mt-2 opacity-60 uppercase">
                    Precision Performance
                </p>
</div>
<!-- Loading Journey Section -->
<div class="w-full space-y-6">
<!-- Linear Progress Bar (The Progress Pulse) -->
<div class="relative w-full h-[2px] bg-surface-container-highest rounded-full overflow-hidden">
<!-- Progress Fill -->
<div class="absolute top-0 left-0 h-full w-[65%] bg-gradient-to-r from-secondary to-primary-container transition-all duration-700 ease-out">
<!-- Glow Leading Edge -->
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 bg-primary-container rounded-full blur-sm opacity-80 progress-pulse-head"></div>
</div>
</div>
<!-- Status Label -->
<div class="flex flex-col items-center gap-2">
<span class="font-label text-xs font-medium text-on-surface-variant tracking-wider uppercase">
                        Baixando dados do atleta...
                    </span>
<!-- Percentage Counter (Visual Only) -->
<span class="font-headline font-bold text-primary-container text-xl tabular-nums">
                        65%
                    </span>
</div>
</div>
</div>
<!-- Decorative Background Element: Abstract Motion -->
<div class="absolute inset-0 z-0 flex items-center justify-center opacity-[0.03] pointer-events-none">
<span class="font-headline font-black text-[25rem] select-none italic transform -rotate-12 translate-x-20">
                APEX
            </span>
</div>
<!-- Footer Meta -->
<div class="absolute bottom-12 left-0 w-full flex flex-col items-center gap-4 px-8">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-fixed/40 text-sm">bolt</span>
<span class="font-label text-[10px] text-on-surface-variant tracking-[0.2em] uppercase">
                    Powered by Kinetic Engine v4.0
                </span>
</div>
</div>
</main>
<!-- Hidden Image Data for AI Generation (Consistent with Brand Palette) -->
<div class="hidden">
<div data-alt="Abstract dark background with neon green and cyan light trails representing high-speed motion and kinetic energy"></div>
</div>
</body></html>
